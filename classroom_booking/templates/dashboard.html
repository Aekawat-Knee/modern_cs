<!DOCTYPE html>
<html>
<head>

<title>Room Booking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
}

.card:hover{
transform:scale(1.03);
transition:0.2s;
}

</style>

</head>

<body>

  <a href="/profile" class="btn btn-dark">
👤 Profile
</a>

<div class="d-flex justify-content-between mb-3">

<h2>📚 Classroom Booking</h2>


</a>

</div>

<div class="container mt-5">

<h2 class="mb-4">📚 Classroom Booking</h2>

<div class="row">

<div class="col-md-4">

<div class="card shadow">

<img src="/static/room1.jpg" class="card-img-top">

<div class="card-body">

<h5>ComSci Lab</h5>

<a href="/book?room=ComSci Lab" class="btn btn-primary">Book</a>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card shadow">

<img src="/static/room2.jpg" class="card-img-top">

<div class="card-body">

<h5>Lecture Room A</h5>

<a href="/book?room=Lecture A" class="btn btn-primary">Book</a>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card shadow">

<img src="/static/room3.jpg" class="card-img-top">

<div class="card-body">

<h5>Meeting Room</h5>

<a href="/book?room=Meeting Room" class="btn btn-primary">Book</a>

</div>

</div>

</div>

</div>

<hr class="mt-5">

<h3>📅 Booking List</h3>

<table class="table table-striped">

<tr>
<th>Room</th>
<th>Date</th>
<th>Student</th>
<th>Action</th>
</tr>

{% for b in bookings %}

<tr>
<td>{{b.room}}</td>
<td>{{b.date}}</td>
<td>{{b.student}}</td>

<td>
<a href="/delete/{{b.id}}" class="btn btn-danger btn-sm">
Delete
</a>
</td>

</tr>

{% endfor %}

</table>
